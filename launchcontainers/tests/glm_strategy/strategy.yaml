strategies:

  # ── Custom yaml-backed strategies ──────────────────────────────────────────
  # Confound columns are resolved manually from fMRIPrep output using the
  # column_groups and regex_groups tables below.
  basic:
    backend: yaml
    high_pass: true
    motion: basic
    wm_csf: none
    global_signal: none
    scrub: false
    compcor: anat_combined
    n_compcor: all
    demean: false

  basic_scrub:
    backend: yaml
    high_pass: true
    motion: basic
    wm_csf: none
    global_signal: none
    scrub: true
    compcor: anat_combined
    n_compcor: all
    demean: false

  basic_full_MC:
    backend: yaml
    high_pass: true
    motion: full
    wm_csf: none
    global_signal: none
    scrub: false
    compcor: anat_combined
    n_compcor: all
    demean: false

  basic_full_MC_scrub:
    backend: yaml
    high_pass: true
    motion: full
    wm_csf: none
    global_signal: none
    scrub: true
    compcor: anat_combined
    n_compcor: all
    demean: false

  # ── nilearn built-in strategies ────────────────────────────────────────────
  # Confounds are loaded via nilearn.interfaces.fmriprep.load_confounds_strategy.
  # For scrubbing, nilearn returns a sample_mask; those volumes are removed from
  # the data and frame_times before fitting the GLM (true volume censoring).

  simple:
    # motion=full (24 params) + WM/CSF basic + cosine high-pass + demean
    backend: nilearn
    nilearn_strategy: simple

  scrubbing:
    # FD/DVARS censoring + motion=full + WM/CSF full + cosine high-pass + demean
    backend: nilearn
    nilearn_strategy: scrubbing
    fd_threshold: 0.5
    std_dvars_threshold: 1.5
    scrub: 3  # number of neighbour volumes to also censor around each bad TR

  compcor:
    # aCompCor (all components) + motion=full + cosine high-pass + demean
    backend: nilearn
    nilearn_strategy: compcor
    n_compcor: all

  scrubbing_basic_compcor:
    # FD/DVARS volume censoring (±scrub neighbours) + aCompCor + motion=full
    # + cosine high-pass + demean.  No WM/CSF signals.
    backend: nilearn
    strategy: [motion, high_pass, compcor, scrub]
    motion: basic
    compcor: anat_combined
    n_compcor: all
    fd_threshold: 0.5
    std_dvars_threshold: 1.5
    scrub: 3

  scrubbing_full_compcor:
    # FD/DVARS volume censoring (±scrub neighbours) + aCompCor + motion=full
    # + cosine high-pass + demean.  No WM/CSF signals.
    backend: nilearn
    strategy: [motion, high_pass, compcor, scrub]
    motion: full
    compcor: anat_combined
    n_compcor: all
    fd_threshold: 0.5
    std_dvars_threshold: 1.5
    scrub: 3


column_groups:
  motion_basic:
    - trans_x
    - trans_y
    - trans_z
    - rot_x
    - rot_y
    - rot_z

  motion_full:
    - trans_x
    - trans_y
    - trans_z
    - rot_x
    - rot_y
    - rot_z
    - trans_x_derivative1
    - trans_y_derivative1
    - trans_z_derivative1
    - rot_x_derivative1
    - rot_y_derivative1
    - rot_z_derivative1
    - trans_x_power2
    - trans_y_power2
    - trans_z_power2
    - rot_x_power2
    - rot_y_power2
    - rot_z_power2
    - trans_x_derivative1_power2
    - trans_y_derivative1_power2
    - trans_z_derivative1_power2
    - rot_x_derivative1_power2
    - rot_y_derivative1_power2
    - rot_z_derivative1_power2

  wm_csf_basic:
    - white_matter
    - csf

  wm_csf_full:
    - white_matter
    - csf
    - white_matter_derivative1
    - csf_derivative1
    - white_matter_power2
    - csf_power2
    - white_matter_derivative1_power2
    - csf_derivative1_power2

  global_signal_basic:
    - global_signal

  global_signal_full:
    - global_signal
    - global_signal_derivative1
    - global_signal_power2
    - global_signal_derivative1_power2

regex_groups:
  compcor_anat_combined:
    - "^a_comp_cor_"

  compcor_temporal:
    - "^t_comp_cor_"

  cosine:
    - "^cosine"

  non_steady_state:
    - "^non_steady_state_outlier"

  motion_outlier:
    - "^motion_outlier"
